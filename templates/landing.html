<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nupe Songs Admin - Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glow-circle-1 {
            animation: pulse-slow 8s infinite alternate;
        }
        @keyframes pulse-slow {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.1); opacity: 0.25; }
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center overflow-hidden bg-[#0c101d] text-white">

    <!-- Glowing background circles -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600 rounded-full filter blur-[120px] glow-circle-1 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-600 rounded-full filter blur-[120px] opacity-20 pointer-events-none"></div>

    <!-- Main card -->
    <div class="w-full max-w-md p-8 rounded-3xl bg-[#151c2c]/60 border border-gray-800 backdrop-blur-xl shadow-2xl relative z-10 mx-4">
        
        <!-- Logo / Icon -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#6c50e9] to-[#fc4a93] flex items-center justify-center shadow-lg shadow-[#6c50e9]/20 mb-4">
                <span class="material-symbols-outlined text-3xl text-white">music_note</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">
                Nupe Songs Admin
            </h1>
            <p class="text-xs text-gray-400 mt-1">Sign in to manage your music platform</p>
        </div>

        <!-- Error Alert -->
        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">error</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="/" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                    Username
                </label>
                <div class="relative">
                    <span class="absolute left-3.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-base text-gray-500">
                        person
                    </span>
                    <input
                        type="text"
                        name="username"
                        required
                        placeholder="admin"
                        class="w-full pl-11 pr-4 py-3 bg-[#0c101d]/80 border border-gray-800 rounded-xl focus:border-[#6c50e9] focus:ring-1 focus:ring-[#6c50e9] outline-none transition-all text-sm text-white placeholder-gray-600"
                    />
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                    Password
                </label>
                <div class="relative">
                    <span class="absolute left-3.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-base text-gray-500">
                        lock
                    </span>
                    <input
                        type="password"
                        name="password"
                        required
                        placeholder="••••••••"
                        class="w-full pl-11 pr-4 py-3 bg-[#0c101d]/80 border border-gray-800 rounded-xl focus:border-[#6c50e9] focus:ring-1 focus:ring-[#6c50e9] outline-none transition-all text-sm text-white placeholder-gray-600"
                    />
                </div>
            </div>

            <button
                type="submit"
                class="w-full py-3 bg-gradient-to-r from-[#6c50e9] to-[#573ecf] hover:from-[#7e65f3] hover:to-[#6c50e9] text-white font-medium rounded-xl transition-all shadow-md shadow-[#6c50e9]/20 hover:shadow-[#6c50e9]/30 active:scale-[0.98] mt-2 flex items-center justify-center gap-2 text-sm"
            >
                <span>Sign In</span>
                <span class="material-symbols-outlined text-sm">login</span>
            </button>
        </form>

        <div class="mt-8 text-center text-[10px] text-gray-500">
            Demo: Use <code class="text-[#fc4a93] font-mono">admin</code> / 
            <code class="text-[#fc4a93] font-mono">admin123</code>
        </div>
    </div>

</body>
</html>
